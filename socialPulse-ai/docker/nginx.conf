# ══════════════════════════════════════════════════════════════════════════════
#  SocialPulse AI — Nginx Reverse Proxy Configuration
#
#  Routes:
#    /api/*       → FastAPI backend  (sp_backend:8000)
#    /            → Next.js frontend (sp_frontend:3000)
# ══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging format ──────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  sendfile           on;
  keepalive_timeout  65;
  client_max_body_size 20M;     # allow image uploads up to 20 MB

  # ── Gzip compression ────────────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript
             image/svg+xml;
  gzip_min_length  1000;
  gzip_proxied     any;
  gzip_comp_level  5;

  # ── Upstream definitions ────────────────────────────────────────────────────
  upstream frontend_upstream {
    server sp_frontend:3000;
    keepalive 32;
  }

  upstream backend_upstream {
    server sp_backend:8000;
    keepalive 32;
  }

  # ── Main server block ───────────────────────────────────────────────────────
  server {
    listen 80;
    server_name localhost;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          "DENY"                    always;
    add_header X-Content-Type-Options   "nosniff"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── API routes → FastAPI ──────────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";

      # Timeouts (AI calls can be slow)
      proxy_read_timeout    120s;
      proxy_connect_timeout  10s;
    }

    # ── FastAPI OpenAPI docs ──────────────────────────────────────────────────
    location ~ ^/(health|docs|redoc|openapi\.json) {
      proxy_pass         http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Next.js _next/static — long-lived cache ───────────────────────────────
    location /_next/static/ {
      proxy_pass         http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    # ── All other routes → Next.js ────────────────────────────────────────────
    location / {
      proxy_pass         http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";   # WebSocket support
    }
  }
}
